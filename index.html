<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compile Dolphin to WASM</title>
</head>
<body>
    <h1>Compile Dolphin Emulator to WASM</h1>
    <p>Click the button below to open Emception and compile the Dolphin emulator.</p>
    <button onclick="openEmception()">Open Emception</button>
    <p id="status"></p>

    <script>
        function openEmception() {
            document.getElementById("status").innerText = "Opening Emception... Please wait.";
            window.open("https://jprendes.github.io/emception/");
        }
    </script>
</body>
</html>
