<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Installer</title>
</head>
<body>
    <h2>APK Installer for Chromebook</h2>
    <p>Select an APK file to attempt installation:</p>
    <input type="file" id="apkFile" accept=".apk">
    <button onclick="installAPK()">Install APK</button>

    <script>
        function installAPK() {
            let fileInput = document.getElementById('apkFile');
            if (fileInput.files.length === 0) {
                alert("Please select an APK file.");
                return;
            }

            let apkFile = fileInput.files[0];
            let apkURL = URL.createObjectURL(apkFile);

            // Attempting to open APK (May be blocked on ChromeOS)
            window.location.href = apkURL;

            alert("If the installation does not start, your Chromebook may block direct APK installs.");
        }
    </script>
</body>
</html>
